<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>財政情報ポータル | 日本と世界の財政・社会保障ニュース</title>
  <meta name="description" content="日本の歳出・歳入、海外の財政・社会保障ニュース、有識者のレポートをAIが毎日収集・要約して届ける財政情報ポータルサイト">
  <meta name="robots" content="noindex, nofollow, noarchive">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Noto+Serif+JP:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css?v=20260704b">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <div class="header-top">
        <h1 class="site-title"><span class="title-mark">¥</span> 財政情報ポータル</h1>
        <p class="site-subtitle">Fiscal Policy Watch — 日本と世界の財政・社会保障を追う</p>
      </div>
      <p class="update-info">最終更新: <time id="last-updated">読み込み中…</time>｜AIが毎日自動収集・要約</p>
    </div>
  </header>

  <nav class="category-nav">
    <div class="container nav-inner">
      <div class="tabs" role="tablist">
        <button class="tab active" data-category="all">すべて</button>
        <button class="tab tab-expenditure" data-category="expenditure">歳出<span class="tab-note">社会保障・教育・公共事業・防衛</span></button>
        <button class="tab tab-revenue" data-category="revenue">歳入<span class="tab-note">税・保険料・国債</span></button>
        <button class="tab tab-international" data-category="international">国際<span class="tab-note">各国の財政・社会保障</span></button>
        <button class="tab tab-research" data-category="research">論文・レポート<span class="tab-note">有識者・研究機関</span></button>
      </div>
      <input type="search" id="search-box" class="search-box" placeholder="キーワード検索（例: 国債、医療、IMF）">
    </div>
    <div class="container subtabs" id="subtabs" hidden></div>
  </nav>

  <main class="container">
    <div id="notice" class="notice" hidden></div>
    <div id="article-list" class="article-grid" aria-live="polite"></div>
    <p id="empty-message" class="empty-message" hidden>該当する記事が見つかりませんでした。</p>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>本サイトの要約はAI（Claude）が自動生成しています。内容の正確性は保証されないため、必ずリンク先の一次情報をご確認ください。</p>
      <p>カテゴリ: <strong>歳出</strong>＝社会保障・教育・公共事業・防衛など国・自治体の支出／<strong>歳入</strong>＝税・保険料・国債／<strong>国際</strong>＝海外の財政・社会保障ニュース／<strong>論文・レポート</strong>＝内外の有識者・研究機関の分析（英語論文・日本語論文・国際機関レポート・日本語レポートの4種別）</p>
    </div>
  </footer>

  <script src="assets/app.js?v=20260704b"></script>
</body>
</html>
